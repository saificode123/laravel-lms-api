# Define the user and worker processes
user nginx;
worker_processes auto;

events {
    # How many concurrent connections each worker can handle
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Optimize file transfers
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # -----------------------------------------------------------
    # PERFORMANCE BUFFERS (Prevents 504/502 on slow systems)
    # -----------------------------------------------------------
    client_max_body_size 64M;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;

    # -----------------------------------------------------------
    # THE LOAD BALANCER POOL
    # -----------------------------------------------------------
    upstream laravel_api {
        server app:9000; 
    }

    server {
        listen 80;
        server_name localhost;

        # The entry point for Laravel
        root /var/www/public;
        index index.php index.html;

        # -----------------------------------------------------------
        # ROUTING LOGIC
        # -----------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # -----------------------------------------------------------
        # PHP-FPM PASS-THROUGH (The Timeout Fix)
        # -----------------------------------------------------------
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass laravel_api;
            fastcgi_index index.php;
            
            # Standard FastCGI parameters
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # --- THE 504 TIMEOUT FIX ---
            # Increase these values to give your slow Docker container more time
            fastcgi_read_timeout 300;
            fastcgi_connect_timeout 300;
            fastcgi_send_timeout 300;
            proxy_read_timeout 300;
        }

        # Deny access to hidden files (like .env) for security
        location ~ /\.ht {
            deny all;
        }

        location ~ /\.env {
            deny all;
        }
    }
}