# Define the user and worker processes
user nginx;
worker_processes auto;

events {
    # How many concurrent connections each worker can handle
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Optimize file transfers
    sendfile on;
    keepalive_timeout 65;

    # -----------------------------------------------------------
    # THE LOAD BALANCER POOL
    # -----------------------------------------------------------
    # Docker's internal DNS automatically resolves the service name 'app' 
    # to the IP addresses of all 3 replicas we defined in docker-compose.yml.
    upstream laravel_api {
        server app:9000; 
    }

    server {
        # Listen for traffic on port 80 (Mapped to 8000 on your machine)
        listen 80;
        server_name localhost;

        # The entry point for Laravel
        root /var/www/public;
        index index.php index.html;

        # -----------------------------------------------------------
        # ROUTING LOGIC
        # -----------------------------------------------------------
        location / {
            # Try to serve a file directly, if not, send it to index.php (Laravel Router)
            try_files $uri $uri/ /index.php?$query_string;
        }

        # -----------------------------------------------------------
        # PHP-FPM PASS-THROUGH
        # -----------------------------------------------------------
        location ~ \.php$ {
            try_files $uri =404;
            # Pass the request to our load balancer pool defined above
            fastcgi_pass laravel_api;
            fastcgi_index index.php;
            
            # Standard FastCGI parameters
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        # Deny access to hidden files (like .env) for security
        location ~ /\.ht {
            deny all;
        }
    }
}